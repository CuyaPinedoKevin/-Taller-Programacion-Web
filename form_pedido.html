<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FasstSave Kevin - Formulario de pedido</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="image.png" alt="Logo FasstSave Kevin">
    <h1>FasstSave Kevin</h1>
    <h2>Formulario de pedido</h2>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="menu.html">Menú</a>
      <a href="pedidos.html">Pedidos</a>
      <a href="ofertas.html">Ofertas</a>
    </nav>
  </header>

  <main>
    <div class="tarjeta">
    <h2>Completa tus datos</h2>
    <form action="pedidos.html" method="get">
      <div>
        <label for="cliente">Nombre del cliente:</label><br>
        <input type="text" id="cliente" name="cliente" required>
      </div>
      <div>
        <label for="direccion">Dirección:</label><br>
        <input type="text" id="direccion" name="direccion" required>
      </div>
      <div>
        <label for="telefono">Teléfono:</label><br>
        <input type="tel" id="telefono" name="telefono" required>
      </div>
      <div>
        <label for="plato">Selección de platos:</label><br>
        <select id="plato" name="plato" required>
          <option value="">Seleccione una opción</option>
          <option value="combo-ensaladas">Combo de ensaladas</option>
          <option value="sandwiches">Pack de sandwiches</option>
          <option value="postres">Postres variados</option>
          <option value="plato-casero">Plato casero</option>
        </select>
      </div>
      <div>
        <label for="cantidad">Cantidad:</label><br>
        <input type="number" id="cantidad" name="cantidad" min="1" max="20" required>
      </div>
      <div>
        <button type="submit">Enviar pedido</button>
      </div>
    </form>

    <p class="acciones"><a class="boton" href="menu.html">Regresar al menú</a> <a class="boton" href="index.html">Volver al inicio</a></p>
    </div>
  </main>

  <footer>
    <p>Gracias por apoyar el rescate de alimentos.</p>
  </footer>
</body>
</html>

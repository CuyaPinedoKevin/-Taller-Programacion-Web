<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FasstSave Kevin - Iniciar sesión</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="image.png" alt="Logo FasstSave Kevin">
    <h1>FasstSave Kevin</h1>
    <p>Plataforma para reducir el desperdicio de alimentos.</p>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="registrar.html">Registrarse</a>
      <a href="menu.html">Menú</a>
      <a href="ofertas.html">Ofertas</a>
    </nav>
  </header>

  <main>
    <div class="tarjeta">
    <h2>Iniciar sesión</h2>
    <form action="index.html" method="get">
      <div>
        <label for="usuario">Usuario:</label><br>
        <input type="text" id="usuario" name="usuario" required>
      </div>
      <div>
        <label for="contrasena">Contraseña:</label><br>
        <input type="password" id="contrasena" name="contrasena" required>
      </div>
      <div>
        <button type="submit">Ingresar</button>
      </div>
    </form>

    <p>Si aún no tienes cuenta, <a href="registrar.html">regístrate aquí</a>.</p>
    </div>
  </main>

  <footer>
    <p>FasstSave Kevin 2026</p>
  </footer>
</body>
</html>

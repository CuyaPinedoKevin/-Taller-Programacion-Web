<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FasstSave Kevin - Registro</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <img src="image.png" alt="Logo FasstSave Kevin">
    <h1>FasstSave Kevin</h1>
    <p>Registro de nuevos usuarios solidarios con el rescate de alimentos.</p>
    <nav>
      <a href="login.html">Iniciar sesión</a>
      <a href="index.html">Inicio</a>
      <a href="menu.html">Menú</a>
      <a href="ofertas.html">Ofertas</a>
    </nav>
  </header>

  <main>
    <div class="tarjeta">
    <h2>Registrar usuario</h2>
    <form action="login.html" method="get">
      <div>
        <label for="nombre">Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre" required>
      </div>
      <div>
        <label for="correo">Correo electrónico:</label><br>
        <input type="email" id="correo" name="correo" required>
      </div>
      <div>
        <label for="clave">Contraseña:</label><br>
        <input type="password" id="clave" name="clave" required>
      </div>
      <div>
        <label for="confirmar">Confirmar contraseña:</label><br>
        <input type="password" id="confirmar" name="confirmar" required>
      </div>
      <div>
        <button type="submit">Registrar</button>
      </div>
    </form>

    <p><a href="login.html">Volver a iniciar sesión</a></p>
    </div>
  </main>

  <footer>
    <p>FasstSave Kevin 2026</p>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodSave - Registro</title>
</head>
<body>
  <header>
    <img src="image.png" alt="Logo FasstSave Kevin" width="180">
    <h1>FasstSave Kevin</h1>
    <p>Registro de nuevos usuarios solidarios con el rescate de alimentos.</p>
    <nav>
      <a href="login.html">Iniciar sesion</a> |
      <a href="index.html">Inicio</a> |
      <a href="menu.html">Menu</a> |
      <a href="ofertas.html">Ofertas</a>
    </nav>
    <hr>
  </header>

  <main>
    <h2>Registrar usuario</h2>
    <form action="login.html" method="get">
      <p>
        <label for="nombre">Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre" required>
      </p>
      <p>
        <label for="correo">Correo electronico:</label><br>
        <input type="email" id="correo" name="correo" required>
      </p>
      <p>
        <label for="clave">Contrasena:</label><br>
        <input type="password" id="clave" name="clave" required>
      </p>
      <p>
        <label for="confirmar">Confirmar contrasena:</label><br>
        <input type="password" id="confirmar" name="confirmar" required>
      </p>
      <p>
        <button type="submit">Registrar</button>
      </p>
    </form>

    <p><a href="login.html">Volver a iniciar sesion</a></p>
  </main>

  <footer>
    <hr>
    <p>FoodSave 2026</p>
  </footer>
</body>
</html>
